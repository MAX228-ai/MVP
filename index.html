<!DOCTYPE html>
<html lang="lv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FocusFlow MVP</title>

    <style>
        :root {
            --bg: #f5f6fa;
            --primary: #4834d4;
            --text: #2f3542;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: var(--bg);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            background: white;
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            width: 320px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        h1 { color: var(--primary); }

        .timer-display {
            font-size: 48px;
            margin: 20px 0;
        }

        input {
            width: 60px;
            padding: 5px;
            text-align: center;
        }

        .btn {
            margin: 5px;
            padding: 10px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            color: white;
        }

        .start { background: #2ecc71; }
        .pause { background: #f39c12; }
        .reset { background: #e74c3c; }
    </style>
</head>

<body>

<div class="container">
    <h1>FocusFlow</h1>

    <p>Ievadi minūtes:</p>
    <input type="number" id="minInput" value="25">

    <div class="timer-display" id="display">25:00</div>

    <button class="btn start" onclick="startTimer()">Start</button>
    <button class="btn pause" onclick="pauseTimer()">Pause</button>
    <button class="btn reset" onclick="resetTimer()">Reset</button>
</div>

<script>
let timeLeft = 1500;
let timerId = null;
let isRunning = false;
let lastInput = 25;

// LOGGER
const logger = {
    debug: (msg, ctx={}) => console.debug("[DEBUG]", msg, ctx),
    info: (msg, ctx={}) => console.info("[INFO]", msg, ctx),
    warn: (msg, ctx={}) => console.warn("[WARN]", msg, ctx),
    error: (msg, ctx={}) => console.error("[ERROR]", msg, ctx)
};

window.onload = () => {
    logger.info("App loaded", {version: "1.1"});
    updateDisplay();
};

function updateDisplay() {
    logger.debug("Updating display", {timeLeft});

    let min = Math.floor(timeLeft / 60);
    let sec = timeLeft % 60;

    document.getElementById("display").innerText =
        `${min.toString().padStart(2,"0")}:${sec.toString().padStart(2,"0")}`;
}

function startTimer() {
    let val = Number(document.getElementById("minInput").value);

    logger.debug("Start clicked", {input: val});

    if (!val || val <= 0) {
        logger.error("Invalid input", {value: val});
        alert("Ievadi pareizu skaitli!");
        return;
    }

    if (isRunning) {
        logger.warn("Timer already running");
        return;
    }

    lastInput = val;
    timeLeft = val * 60;
    isRunning = true;

    logger.info("Timer started", {minutes: val});

    timerId = setInterval(() => {
        if (timeLeft > 0) {
            timeLeft--;
            updateDisplay();
        } else {
            clearInterval(timerId);
            isRunning = false;

            logger.info("Session finished", {minutes: val});
            alert("Laiks beidzies!");
        }
    }, 1000);
}

function pauseTimer() {
    if (!isRunning) {
        logger.warn("Pause without active timer");
        return;
    }

    clearInterval(timerId);
    isRunning = false;

    logger.info("Timer paused", {
        time: document.getElementById("display").innerText
    });
}

function resetTimer() {
    clearInterval(timerId);
    isRunning = false;

    timeLeft = lastInput * 60;

    logger.info("Timer reset", {restored: lastInput});

    updateDisplay();
}
</script>

</body>
</html>
